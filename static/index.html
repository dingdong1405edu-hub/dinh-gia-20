<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Giải phiếu bài tập — 3 Agents</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #eff6ff 0%, #faf5ff 100%);
    min-height: 100vh;
    padding: 32px 16px;
    color: #111827;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.18);
    padding: 32px;
  }
  h1 { margin: 0 0 6px; font-size: 24px; }
  .sub { color: #6b7280; margin-bottom: 22px; font-size: 14px; }
  .agents {
    display: flex; gap: 8px; margin-bottom: 22px;
    font-size: 12px; color: #4b5563;
  }
  .agent {
    flex: 1; padding: 10px; background: #f3f4f6;
    border-radius: 8px; text-align: center;
  }
  .agent strong { display: block; color: #2563eb; font-size: 13px; margin-bottom: 2px; }
  .drop {
    border: 2px dashed #c7d2fe;
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    background: #fafbff;
  }
  .drop:hover, .drop.drag { border-color: #6366f1; background: #eef2ff; }
  .drop p { margin: 8px 0 0; color: #6b7280; font-size: 14px; }
  .drop strong { color: #4f46e5; }
  .filename { margin-top: 12px; font-size: 13px; color: #2563eb; font-weight: 500; }
  input[type=file] { display: none; }
  button {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border: 0;
    border-radius: 10px;
    background: #2563eb;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
  }
  button:hover:not(:disabled) { background: #1d4ed8; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  .stage {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    background: #fef3c7;
    color: #92400e;
    border-radius: 8px;
    font-size: 14px;
  }
  .stage.show { display: block; }
  .summary {
    margin-top: 24px;
    padding: 16px;
    background: #ecfdf5;
    color: #065f46;
    border-radius: 10px;
    display: none;
  }
  .summary.show { display: block; }
  .download {
    display: inline-block;
    margin-top: 12px;
    padding: 12px 18px;
    background: #10b981; color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }
  .download:hover { background: #059669; }
  .problems { margin-top: 22px; display: none; }
  .problems.show { display: block; }
  .problem {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .problem h3 {
    margin: 0 0 6px;
    font-size: 14px;
    color: #2563eb;
  }
  .problem .stmt {
    font-size: 13px; color: #374151; margin-bottom: 8px; white-space: pre-wrap;
  }
  .problem .ans {
    font-size: 14px; color: #065f46; font-weight: 600;
    background: #ecfdf5; padding: 6px 10px; border-radius: 6px;
    display: inline-block; margin-bottom: 6px;
  }
  .problem .num { color: #6b7280; font-size: 12px; margin-left: 6px; }
  .problem .steps {
    font-size: 12px; color: #6b7280; white-space: pre-wrap; margin-top: 4px;
  }
  .error { color: #dc2626; margin-top: 14px; font-size: 14px; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid #fff; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap"><div class="card">
  <h1>Giải phiếu bài tập toán</h1>
  <p class="sub">Tải PDF/ảnh phiếu bài tập (có thể nhiều câu) → hệ thống OCR, giải, và xuất PDF đáp án.</p>

  <div class="agents">
    <div class="agent"><strong>Agent 1</strong>OCR đề bài</div>
    <div class="agent"><strong>Agent 2</strong>Giải toán</div>
    <div class="agent"><strong>Agent 3</strong>Xuất PDF</div>
  </div>

  <label class="drop" id="drop">
    <input type="file" id="file" accept="application/pdf,image/png,image/jpeg,image/webp" />
    <div style="font-size:30px">📄</div>
    <p><strong>Click chọn</strong> hoặc kéo thả PDF/ảnh phiếu bài tập vào đây</p>
    <div class="filename" id="filename"></div>
  </label>

  <button id="submit" disabled>Xử lý</button>

  <div class="stage" id="stage"></div>

  <div class="summary" id="summary">
    <div id="summary-text"></div>
    <a class="download" id="download" href="#" download>⬇ Tải PDF đáp án</a>
  </div>

  <div class="problems" id="problems"></div>

  <div class="error" id="error"></div>
</div></div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const filename = document.getElementById('filename');
const submit = document.getElementById('submit');
const stage = document.getElementById('stage');
const summary = document.getElementById('summary');
const summaryText = document.getElementById('summary-text');
const problemsEl = document.getElementById('problems');
const errorEl = document.getElementById('error');

let selected = null;

function setFile(f) {
  selected = f;
  filename.textContent = f ? f.name : '';
  submit.disabled = !f;
  summary.classList.remove('show');
  problemsEl.classList.remove('show');
  errorEl.textContent = '';
}

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) setFile(e.target.files[0]);
});
['dragover', 'dragenter'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
['dragleave', 'drop'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  const ok = ['application/pdf','image/png','image/jpeg','image/webp'].includes(f?.type);
  if (ok) setFile(f);
  else errorEl.textContent = 'Chỉ chấp nhận PDF hoặc ảnh (PNG/JPG/WEBP)';
});

function escape(s) { return (s || '').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

submit.addEventListener('click', async () => {
  if (!selected) return;
  errorEl.textContent = '';
  summary.classList.remove('show');
  problemsEl.classList.remove('show');
  problemsEl.innerHTML = '';
  submit.disabled = true;
  submit.innerHTML = '<span class="spinner"></span>Đang xử lý (có thể mất 30-90 giây)...';
  stage.classList.add('show');
  stage.textContent = '⏳ Agent 1 đang đọc đề bài, Agent 2 đang giải, Agent 3 đang xuất PDF...';

  try {
    const fd = new FormData();
    fd.append('file', selected);
    const res = await fetch('/api/process', { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const data = await res.json();

    summaryText.innerHTML = `✅ Đã giải <b>${data.count}</b> bài. PDF đáp án sẵn sàng:`;
    document.getElementById('download').href = data.download_url;
    summary.classList.add('show');

    const solByNum = {};
    (data.solutions || []).forEach(s => { solByNum[String(s.number)] = s; });
    problemsEl.innerHTML = (data.problems || []).map(p => {
      const sol = solByNum[String(p.number)] || {};
      const stmt = p.statement_text || (p.statement_math ? '$' + p.statement_math + '$' : '');
      const ans = sol.answer_latex || '?';
      const num = sol.answer_numeric ? `<span class="num">≈ ${escape(sol.answer_numeric)}</span>` : '';
      const steps = sol.steps_text ? `<div class="steps">${escape(sol.steps_text)}</div>` : '';
      return `<div class="problem">
        <h3>Bài ${escape(p.number)}</h3>
        <div class="stmt">${escape(stmt)}</div>
        <div><span class="ans">${escape(ans)}</span>${num}</div>
        ${steps}
      </div>`;
    }).join('');
    problemsEl.classList.add('show');
  } catch (e) {
    errorEl.textContent = '⚠ ' + e.message;
  } finally {
    stage.classList.remove('show');
    submit.disabled = false;
    submit.textContent = 'Xử lý';
  }
});
</script>
</body>
</html>
